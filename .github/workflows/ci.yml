name: Stage 2 CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python lint tools
        run: |
          pip install flake8

      - name: Run Python lint
        run: flake8 api worker || true

      - name: Install Node dependencies
        run: |
          cd frontend
          npm install

      - name: Run ESLint
        run: |
          cd frontend
          npx eslint . || true

      - name: Install Hadolint
        run: |
          wget -O hadolint https://github.com/hadolint/hadolint/releases/latest/download/hadolint-Linux-x86_64
          chmod +x hadolint

      - name: Lint Dockerfiles
        run: |
          ./hadolint api/Dockerfile || true
          ./hadolint worker/Dockerfile
          ./hadolint frontend/Dockerfile

  test:
    runs-on: ubuntu-latest
    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -r api/requirements.txt
          pip install pytest httpx

      - name: Run tests with coverage
        run: |
          pytest api/tests --junitxml=report.xml

  build:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - name: Build API image
        run: docker build -t jobapp-api:${{ github.sha }} ./api

      - name: Build Worker image
        run: docker build -t jobapp-worker:${{ github.sha }} ./worker

      - name: Build Frontend image
        run: docker build -t jobapp-frontend:${{ github.sha }} ./frontend

  security:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - uses: actions/checkout@v4

      - name: Run Trivy scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'image'
          format: 'sarif'
          output: 'trivy-results.sarif'
          image-ref: jobapp-api:${{ github.sha }}

      - name: Upload SARIF
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-results.sarif

  integration:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - uses: actions/checkout@v4

      - name: Start full stack
        run: docker compose up -d --build

      - name: Wait for API
        run: sleep 20

      - name: Test API health
        run: curl http://localhost:8000/health

      - name: Shutdown stack
        run: docker compose down 