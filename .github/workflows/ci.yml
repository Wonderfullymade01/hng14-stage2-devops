name: Stage 2 CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:

jobs:

# -------------------------
# LINT STAGE
# -------------------------
  lint:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python lint tools
        run: pip install flake8

      - name: Run Python lint
        run: flake8 api worker --ignore=E501,W503

      - name: Install Node dependencies
        run: |
          cd frontend
          npm install

      - name: Run ESLint
        run: |
          cd frontend
          npx eslint . || true

      - name: Install Hadolint
        run: |
          wget -O hadolint https://github.com/hadolint/hadolint/releases/latest/download/hadolint-Linux-x86_64
          chmod +x hadolint

      - name: Lint Dockerfiles
        run: |
          ./hadolint api/Dockerfile
          ./hadolint worker/Dockerfile
          ./hadolint frontend/Dockerfile


# -------------------------
# TEST STAGE
# -------------------------
  test:
    runs-on: ubuntu-latest

    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -r api/requirements.txt
          pip install pytest pytest-cov httpx

      - name: Run tests with coverage
        run: |
          python -m pytest api/tests --cov=api --cov-report=xml --junitxml=report.xml

      - name: Upload test reports
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: |
            report.xml
            coverage.xml


# -------------------------
# BUILD STAGE
# -------------------------
  build:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build API image
        uses: docker/build-push-action@v5
        with:
          context: ./api
          push: false
          tags: jobapp-api:${{ github.sha }}

      - name: Build Worker image
        uses: docker/build-push-action@v5
        with:
          context: ./worker
          push: false
          tags: jobapp-worker:${{ github.sha }}

      - name: Build Frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: false
          tags: jobapp-frontend:${{ github.sha }}


# -------------------------
# SECURITY SCAN
# -------------------------
  security:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - uses: actions/checkout@v4

      - name: Build API image (required for Trivy scan)
        run: docker build -t jobapp-api:${{ github.sha }} ./api

      - name: Run Trivy scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: image
          image-ref: jobapp-api:${{ github.sha }}
          format: sarif
          output: trivy-results.sarif
          exit-code: 1
          severity: CRITICAL,HIGH

      - name: Upload SARIF
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-results.sarif


# -------------------------
# INTEGRATION TEST
# -------------------------
  integration:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - uses: actions/checkout@v4

      - name: Start full stack
        run: docker compose up -d --build

      - name: Wait for API
        run: sleep 20

      - name: Test API health
        run: curl -f http://localhost:8000/health

      - name: Shutdown stack
        if: always()
        run: docker compose down